server.port=8080

# === CONFIGURATION MYSQL ===
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/cartas_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# REMPLACE ICI PAR TON VRAI MOT DE PASSE MYSQL:
spring.datasource.password=root

# Configuration Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=cartas2026SuperSecretKeyMustBe256BitsLongForHMACSHA256Algorithm!
jwt.access-expiration=86400000
jwt.refresh-expiration=604800000


cartas.activation-key=CARTAS-2026-INIT-KEY


cors.allowed-origins=http://localhost:4200

